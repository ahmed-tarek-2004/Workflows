name : on push and pull request workflow

on : 
  push: 
    branches:
      - main
      - "release/**"
    paths:
      - "src/**" 
  pull_request:
    branches:
      - main
      - "release/**"
    paths:
      - "src/**"
jobs:
  test-job:
    runs-on: ubuntu-latest
    steps:
      - name: Git repository checkout
        uses: actions/checkout@v6.0.2

      - name: Run Tests
        run: npm test

        
     